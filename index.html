<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO — overridden per-page by React Helmet -->
  <title>Synckraft Technologies | Enterprise Ecosystem Company</title>
  <meta name="description" content="Synckraft Technologies is the parent ecosystem company behind UNSTOPR, SOLVEIT INDIA, and SOLAROFT — specialized infrastructure brands built for enterprise scale." />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="Synckraft Technologies" />
  <meta name="theme-color" content="#ffffff" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />

  <!-- Open Graph -->
  <meta property="og:title" content="Synckraft Technologies | Enterprise Ecosystem Company" />
  <meta property="og:description" content="Parent company of UNSTOPR, SOLVEIT INDIA, and SOLAROFT — specialized infrastructure brands built for enterprise scale." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://synckraft.in" />
  <meta property="og:image" content="https://synckraft.in/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="Synckraft Technologies" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Synckraft Technologies | Enterprise Ecosystem Company" />
  <meta name="twitter:description" content="Parent company of UNSTOPR, SOLVEIT INDIA, and SOLAROFT — specialized infrastructure brands." />
  <meta name="twitter:image" content="https://synckraft.in/og-image.png" />
  <meta name="twitter:site" content="@synckrafttech" />

  <!-- Performance: DNS prefetch + preconnect for fonts -->
  <link rel="dns-prefetch" href="//fonts.googleapis.com" />
  <link rel="dns-prefetch" href="//fonts.gstatic.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Fonts: Inter + Sora — display=swap for performance -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Sora:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <!-- Critical above-the-fold CSS -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: #ffffff;
      color: #0f172a;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    /* Prevent flash of unstyled content */
    #root { min-height: 100vh; }
    /* Critical loader */
    .sk-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #ffffff;
    }
    .sk-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: sk-spin 0.7s linear infinite;
    }
    @keyframes sk-spin {
      to { transform: rotate(360deg); }
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f8fafc; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>

<body>
  <div id="root">
    <!-- Inline loader shown before React hydrates -->
    <div class="sk-loader" aria-hidden="true">
      <div class="sk-spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
